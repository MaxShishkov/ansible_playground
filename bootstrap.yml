---
- hosts: all
  become: true

  pre_tasks:
    - name: Install update (CentOS)
      tags: always
      dnf:
        update_onlyL: yes
        update_cache: yes
      when: ansible_os_family in ["RedHat", "CentOS"]

    - name: install update (Ubuntu)
      tags: always
      apt:
        upgrade: dist
        update_cache: yes
      when: ansible_os_family in ["Debian", "Ubuntu"]

- hosts: all
  become: true

  tasks:
    - name: Create simone user
      tags: always
      user:
        name: simone
        state: present
        groups: root

    - name: Add ssh key fro simone
      tags: alwasys
      authorized_key:
        user: simone
        state: present
        key: ""

    - name: Add simone to sudoers
      tags: always
      copy:
        dest: /etc/sudoers.d/simone
        content: "simone ALL=(ALL) NOPASSWD:ALL"
        owner: root
        group: root
        mode: "0440"
